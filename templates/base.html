<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Receipt{% endblock %}</title>
  {% block head %}{% endblock %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0f;
      color: #f5f5f7;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    nav {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .nav-brand { font-size: 1.1rem; font-weight: 700; color: #f5f5f7; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 500;
      color: #8e8e93;
      text-decoration: none;
      transition: background .15s, color .15s;
    }
    .nav-link:hover, .nav-link.active { background: #2c2c2e; color: #f5f5f7; }

    .card {
      background: #1c1c1e;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    .card-title {
      font-size: .75rem;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 16px;
    }

    @media (min-width: 900px) {
      nav { max-width: 960px; }
    }
  </style>
  {% block styles %}{% endblock %}
</head>
<body>
  <nav>
    <span class="nav-brand">Receipt</span>
    <div class="nav-links">
      <a href="/" class="nav-link{{ ' active' if active_page == 'scan' else '' }}">Scan</a>
      <a href="/dashboard" class="nav-link{{ ' active' if active_page == 'dashboard' else '' }}">Dashboard</a>
      <a href="/items" class="nav-link{{ ' active' if active_page == 'items' else '' }}">Items</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
