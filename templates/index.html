{% extends "base.html" %}

{% block title %}Receipt{% endblock %}

{% block styles %}
<style>
  nav { margin-bottom: 16px; }

  #upload-area {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #preview {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    display: none;
  }
  #preview img { width: 100%; display: block; }

  label.file-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #0a84ff;
    color: #fff;
    border-radius: 12px;
    padding: 16px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  label.file-btn:active { opacity: .75; }
  #file-input { display: none; }

  #spinner {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 32px 0;
    color: #8e8e93;
    font-size: .9rem;
  }
  .spin {
    width: 36px; height: 36px;
    border: 3px solid #3a3a3c;
    border-top-color: #0a84ff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #review {
    display: none;
    width: 100%;
    max-width: 640px;
    flex-direction: column;
    gap: 16px;
  }

  #review h2 { font-size: 1.1rem; font-weight: 600; }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #1c1c1e;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
    font-size: .875rem;
  }
  th {
    background: #2c2c2e;
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    color: #8e8e93;
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  td {
    padding: 4px 4px;
    border-top: 1px solid #3a3a3c;
    vertical-align: middle;
  }
  td:last-child { text-align: center; }

  input[type="text"], input[type="number"] {
    width: 100%;
    border: none;
    background: transparent;
    padding: 6px 8px;
    font-size: .875rem;
    font-family: inherit;
    color: inherit;
    border-radius: 6px;
    outline: none;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    background: #1a2a3f;
  }
  input[type="number"] { width: 72px; text-align: right; }

  tr.low-confidence { background: #2a1f00; outline: 2px solid #ffa030; outline-offset: -2px; }
  tr.low-confidence td:first-child::before {
    content: "⚠ ";
    color: #ffa030;
    font-size: .8rem;
  }

  .raw-name {
    display: block;
    padding: 6px 8px;
    color: #8e8e93;
    font-size: .8rem;
    white-space: nowrap;
  }

  button.del {
    background: none;
    border: none;
    cursor: pointer;
    color: #ff3b30;
    font-size: 1.1rem;
    padding: 4px 8px;
    border-radius: 6px;
    line-height: 1;
  }
  button.del:hover { background: #3a1a18; }

  button.add-row {
    background: none;
    border: 1px dashed #48484a;
    border-radius: 8px;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    color: #8e8e93;
    font-size: .875rem;
    transition: border-color .15s, color .15s;
  }
  button.add-row:hover { border-color: #0a84ff; color: #0a84ff; }

  .totals {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 4px 4px;
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px;
    font-weight: 600;
    font-size: 1rem;
  }
  .total-row input[type="number"] {
    width: 90px;
    font-weight: 600;
    font-size: 1rem;
    color: inherit;
  }
  .diff-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 4px;
    font-size: .875rem;
    border-radius: 8px;
    padding: 8px 12px;
  }
  .diff-row.ok { background: #0d2a1a; color: #30d158; }
  .diff-row.off { background: #3a1a18; color: #ff453a; }

  button.submit-btn {
    background: #30d158;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: opacity .15s;
  }
  button.submit-btn:active { opacity: .75; }
  button.submit-btn:disabled { background: #48484a; cursor: default; }

  #success-detail {
    color: #8e8e93;
    font-size: .875rem;
    font-weight: 400;
  }

  #success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 48px 0;
    color: #30d158;
    font-size: 1rem;
    font-weight: 500;
  }
  #success .check { font-size: 3rem; }

  #error-msg {
    display: none;
    background: #3a1a18;
    color: #ff453a;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: .875rem;
  }

  @media (min-width: 900px) {
    #review { max-width: 900px; }
  }
</style>
{% endblock %}

{% block content %}
  <div id="upload-area">
    <div id="preview"><img id="preview-img" alt="Receipt preview"></div>
    <label class="file-btn" for="file-input">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      Choose or Scan Receipt
    </label>
    <input id="file-input" type="file" accept="image/*">
    <div id="error-msg"></div>
  </div>

  <div id="spinner">
    <div class="spin"></div>
    <span>Parsing receipt…</span>
  </div>

  <div id="review">
    <h2>Review Items</h2>
    <table id="items-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th style="text-align:right">Price</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="items-body"></tbody>
    </table>
    <button class="add-row" id="add-row-btn">+ Add item</button>
    <div class="totals">
      <div class="total-row">
        <span>Receipt Total</span>
        <input type="number" id="receipt-total" step="0.01" value="0.00">
      </div>
      <div class="total-row" style="font-weight:400;font-size:.9rem;color:#8e8e93">
        <span>Items Sum</span>
        <span id="total-display">$0.00</span>
      </div>
      <div class="diff-row ok" id="diff-row">
        <span id="diff-label">Balanced</span>
        <span id="diff-amount"></span>
      </div>
    </div>
    <div id="error-msg-review"></div>
    <button class="submit-btn" id="submit-btn">Save</button>
  </div>

  <div id="success">
    <div class="check">✓</div>
    <span>Saved!</span>
    <span id="success-detail"></span>
    <button class="file-btn" style="margin-top:8px" onclick="reset()">Scan another</button>
  </div>
{% endblock %}

{% block scripts %}
<script>
  let parsedData = null;

  const fileInput = document.getElementById('file-input');
  const uploadArea = document.getElementById('upload-area');
  const spinner = document.getElementById('spinner');
  const review = document.getElementById('review');
  const success = document.getElementById('success');
  const itemsBody = document.getElementById('items-body');
  const totalDisplay = document.getElementById('total-display');
  const submitBtn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');
  const errorMsgReview = document.getElementById('error-msg-review');

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;

    // Show preview
    const url = URL.createObjectURL(file);
    document.getElementById('preview-img').src = url;
    document.getElementById('preview').style.display = 'block';

    showError('');
    uploadArea.style.display = 'none';
    spinner.style.display = 'flex';

    try {
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch('/receipt', { method: 'POST', body: fd });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      parsedData = await res.json();
      renderReview(parsedData);
      spinner.style.display = 'none';
      review.style.display = 'flex';
    } catch (e) {
      spinner.style.display = 'none';
      uploadArea.style.display = 'flex';
      showError(e.message || 'Something went wrong. Please try again.');
    }
  });

  function renderReview(data) {
    itemsBody.innerHTML = '';
    document.getElementById('receipt-total').value = data.total.toFixed(2);
    data.items.forEach((item, i) => addRow(item));
    updateTotal();
  }

  function addRow(item = { name: '', price: 0, category: '', raw: '', confidence: 1 }) {
    const tr = document.createElement('tr');
    if (item.confidence < 0.8) tr.classList.add('low-confidence');
    tr.innerHTML = `
      <td>
        <input type="text" value="${esc(item.name)}" placeholder="Name" data-field="name">
        ${item.raw ? `<span class="raw-name">${esc(item.raw)}</span>` : ''}
        <input type="hidden" value="${esc(item.raw)}" data-field="raw">
      </td>
      <td><input type="text" value="${esc(item.category)}" placeholder="Category" data-field="category"></td>
      <td><input type="number" value="${item.price.toFixed(2)}" step="0.01" min="0" data-field="price"></td>
      <td><button class="del" title="Remove">×</button></td>
    `;
    tr.querySelector('.del').addEventListener('click', () => { tr.remove(); updateTotal(); });
    tr.querySelectorAll('input').forEach(inp => inp.addEventListener('input', () => {
      if (inp.dataset.field === 'price') updateTotal();
      // user edit removes highlight
      tr.classList.remove('low-confidence');
    }));
    itemsBody.appendChild(tr);
  }

  document.getElementById('add-row-btn').addEventListener('click', () => {
    addRow();
    itemsBody.lastElementChild.querySelector('input').focus();
  });

  function updateTotal() {
    let sum = 0;
    itemsBody.querySelectorAll('input[data-field="price"]').forEach(inp => {
      sum += parseFloat(inp.value) || 0;
    });
    totalDisplay.textContent = '$' + sum.toFixed(2);

    const receiptTotal = parseFloat(document.getElementById('receipt-total').value) || 0;
    const diff = Math.round((sum - receiptTotal) * 100) / 100;
    const diffRow = document.getElementById('diff-row');
    const diffLabel = document.getElementById('diff-label');
    const diffAmount = document.getElementById('diff-amount');
    if (Math.abs(diff) < 0.005) {
      diffRow.className = 'diff-row ok';
      diffLabel.textContent = 'Balanced';
      diffAmount.textContent = '';
    } else {
      diffRow.className = 'diff-row off';
      diffLabel.textContent = diff > 0 ? 'Items over receipt by' : 'Items under receipt by';
      diffAmount.textContent = '$' + Math.abs(diff).toFixed(2);
    }
  }

  document.getElementById('receipt-total').addEventListener('input', updateTotal);

  submitBtn.addEventListener('click', async () => {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving…';
    showReviewError('');

    const items = [];
    let valid = true;
    itemsBody.querySelectorAll('tr').forEach(tr => {
      const name = tr.querySelector('[data-field="name"]').value.trim();
      const category = tr.querySelector('[data-field="category"]').value.trim();
      const price = parseFloat(tr.querySelector('[data-field="price"]').value) || 0;
      const raw = tr.querySelector('[data-field="raw"]').value;
      if (!name) { valid = false; tr.querySelector('[data-field="name"]').focus(); }
      items.push({ name, price, category, raw, confidence: 1 });
    });

    if (!valid) {
      showReviewError('Please fill in all item names.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Save to Sheets';
      return;
    }

    const total = parseFloat(document.getElementById('receipt-total').value) || 0;
    const payload = { total, items, confidence: parsedData?.confidence ?? 1 };

    try {
      const res = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const saved = await res.json();
      document.getElementById('success-detail').textContent =
        `#${saved.id} · $${saved.total.toFixed(2)} · ${new Date(saved.submitted_at).toLocaleString()}`;
      review.style.display = 'none';
      success.style.display = 'flex';
    } catch (e) {
      showReviewError(e.message || 'Failed to save. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Save';
    }
  });

  function reset() {
    fileInput.value = '';
    parsedData = null;
    document.getElementById('preview').style.display = 'none';
    success.style.display = 'none';
    review.style.display = 'none';
    uploadArea.style.display = 'flex';
    showError('');
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = msg ? 'block' : 'none';
  }
  function showReviewError(msg) {
    errorMsgReview.textContent = msg;
    errorMsgReview.style.display = msg ? 'block' : 'none';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }
</script>
{% endblock %}
